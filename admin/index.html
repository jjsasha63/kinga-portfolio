<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Admin — Kinga Trojan</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Inter:wght@300;400;500&family=Syne:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
<script>
(function () {

  /* ─────────────────────────────────────────────────────────────
     LIVE PREVIEW — light warm theme matching the portfolio modal
  ───────────────────────────────────────────────────────────── */
  var ProjectPreview = createClass({
    render: function () {
      var e   = this.props.entry;
      var get = this.props.getAsset;

      var title    = e.getIn(['data','title_pl'])    || 'Tytuł projektu';
      var cat      = e.getIn(['data','category_pl']) || 'Kategoria';
      var subtitle = e.getIn(['data','subtitle_pl']) || '';
      var desc     = e.getIn(['data','card_desc_pl'])|| '';
      var featured = e.getIn(['data','featured']);
      var badge    = e.getIn(['data','badge_pl'])    || 'Wyróżniony projekt';
      var thumb    = e.getIn(['data','thumb']);
      var tagsRaw  = e.getIn(['data','tags']);
      var story    = e.getIn(['data','story']);
      var thumbSrc = thumb ? get(thumb).toString() : null;

      /* Normalise tags — now a comma-separated string */
      var tagList = [];
      if (typeof tagsRaw === 'string' && tagsRaw.trim()) {
        tagList = tagsRaw.split(',').map(function(t){ return t.trim(); }).filter(Boolean);
      } else if (tagsRaw && tagsRaw.size) {
        /* legacy list format */
        tagsRaw.forEach(function(t){ tagList.push(typeof t === 'string' ? t : (t.get && t.get('tag')) || ''); });
      }

      /* Collect story images for the strip */
      var storyImgs = [];
      if (story && story.size) {
        story.forEach(function(block) {
          var img = block.get('img');
          if (img) {
            var src = get(img).toString();
            if (src) storyImgs.push(src);
          }
          var imgs = block.get('imgs');
          if (imgs && imgs.size) {
            imgs.forEach(function(i) {
              var src2 = get(i).toString();
              if (src2) storyImgs.push(src2);
            });
          }
        });
      }

      /* Light warm palette — matches portfolio modal / about section */
      var c = {
        bg:      '#f6f2ed',
        bg2:     '#ede9e3',
        text:    '#1a1818',
        muted:   '#5a5550',
        border:  'rgba(0,0,0,.09)',
        accent:  '#5872a4',
        accent2: '#405a8c',
      };

      return h('div', { style: { background: c.bg, minHeight: '100vh', padding: '2rem', fontFamily: 'Inter, sans-serif' } },

        /* ── preview label ── */
        h('p', { style: { fontSize: '0.65rem', letterSpacing: '0.2em', textTransform: 'uppercase', color: c.muted, fontFamily: 'Syne, sans-serif', marginBottom: '1.5rem' } },
          '↓ Podgląd — karta projektu na stronie głównej'
        ),

        /* ── project card ── */
        h('div', { style: { maxWidth: '820px', border: '1px solid ' + c.border, background: '#fff', display: 'grid', gridTemplateColumns: '62% 38%', marginBottom: '2rem' } },

          /* image side */
          h('div', { style: { position: 'relative', overflow: 'hidden', aspectRatio: '4/3', background: c.bg2 } },
            featured ? h('div', { style: { position: 'absolute', top: '1rem', left: '1rem', background: c.accent, color: '#fff', fontFamily: 'Syne, sans-serif', fontSize: '0.56rem', fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', padding: '0.28rem 0.7rem', borderRadius: '100px', zIndex: 2 } }, badge) : null,
            thumbSrc
              ? h('img', { src: thumbSrc, style: { width: '100%', height: '100%', objectFit: 'cover', display: 'block' } })
              : h('div', { style: { width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: c.muted, fontSize: '0.8rem', flexDirection: 'column', gap: '0.5rem' } },
                  h('span', { style: { fontSize: '1.5rem' } }, '🖼'),
                  h('span', null, 'Dodaj zdjęcie główne')
                )
          ),

          /* info side */
          h('div', { style: { padding: '2.5rem 2rem', display: 'flex', flexDirection: 'column', gap: '0.55rem', borderLeft: '1px solid ' + c.border } },
            h('div', { style: { color: c.accent, fontSize: '0.62rem', letterSpacing: '0.18em', textTransform: 'uppercase', fontFamily: 'Syne, sans-serif', fontWeight: 600 } }, cat),
            h('h2',  { style: { fontFamily: 'Manrope, sans-serif', fontSize: '2rem', fontWeight: 300, color: c.text, margin: 0, lineHeight: 1.05 } }, title),
            h('div', { style: { fontSize: '0.72rem', color: c.muted, lineHeight: 1.55 } }, subtitle),
            h('p',   { style: { fontSize: '0.85rem', color: c.text, opacity: 0.75, lineHeight: 1.65, margin: 0 } }, desc),
            tagList.length
              ? h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '0.35rem', marginTop: '0.15rem' } },
                  tagList.map(function (t, i) {
                    return h('span', { key: i, style: { fontFamily: 'Syne, sans-serif', fontSize: '0.56rem', letterSpacing: '0.08em', textTransform: 'uppercase', padding: '0.22rem 0.65rem', border: '1px solid ' + c.border, borderRadius: '100px', color: c.muted } }, t);
                  })
                )
              : null,
            h('div', { style: { fontSize: '0.67rem', fontFamily: 'Syne, sans-serif', fontWeight: 500, color: c.accent, marginTop: '0.3rem' } }, 'Otwórz projekt →')
          )
        ),

        /* ── story image strip (if any images uploaded) ── */
        storyImgs.length ? h('div', { style: { maxWidth: '820px', marginBottom: '2rem' } },
          h('p', { style: { fontSize: '0.6rem', letterSpacing: '0.18em', textTransform: 'uppercase', color: c.muted, fontFamily: 'Syne, sans-serif', marginBottom: '0.6rem' } },
            'Zdjęcia w treści projektu (' + storyImgs.length + ')'
          ),
          h('div', { style: { display: 'flex', gap: '4px', overflowX: 'auto', scrollbarWidth: 'none' } },
            storyImgs.map(function(src, i) {
              return h('img', { key: i, src: src, style: { height: '120px', width: 'auto', objectFit: 'cover', flexShrink: 0, border: '1px solid ' + c.border } });
            })
          )
        ) : null,

        /* ── tip ── */
        h('div', { style: { maxWidth: '820px', padding: '1rem 1.25rem', background: 'rgba(88,114,164,.07)', border: '1px solid rgba(88,114,164,.18)', borderRadius: '6px', fontSize: '0.78rem', color: c.muted, lineHeight: 1.6 } },
          h('strong', { style: { color: c.accent, fontWeight: 500 } }, 'Wskazówka: '),
          'Podgląd aktualizuje się na żywo po każdej zmianie. Kliknij "Save" a strona odświeży się automatycznie po ok. 30 sekundach.'
        )
      );
    }
  });

  CMS.registerPreviewTemplate('projects', ProjectPreview);

  /* Load portfolio fonts inside the preview iframe */
  CMS.registerPreviewStyle(
    'https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Syne:wght@500;600&family=Inter:wght@300;400;500&display=swap'
  );

  /* ─────────────────────────────────────────────────────────────
     INJECT COBALT ACCENT INTO CMS SHELL BUTTONS
  ───────────────────────────────────────────────────────────── */
  function injectShellStyles () {
    if (document.getElementById('kt-cms-styles')) return;
    var s = document.createElement('style');
    s.id = 'kt-cms-styles';
    s.textContent = [
      'button[class*="primary"],a[class*="primary"]{background:#5872a4!important;border-color:#5872a4!important;color:#fff!important;}',
      'button[class*="primary"]:hover{background:#405a8c!important;}',
      '[class*="NavLink"][class*="active"],[class*="nav"][class*="active"]{color:#5872a4!important;border-color:#5872a4!important;}',
    ].join('');
    document.head.appendChild(s);
  }
  [500, 1500, 3000].forEach(function (ms) { setTimeout(injectShellStyles, ms); });

})();
</script>
</body>
</html>
