<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Panel portfolio — Kinga Trojan</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&family=Inter:wght@300;400;500&family=Syne:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
<script type="module">
  /* Polish UI for the whole CMS shell (config.yml sets locale: pl) */
  import pl from 'https://unpkg.com/decap-cms-locales@3.6.0/dist/esm/pl/index.js';
  if (window.CMS) window.CMS.registerLocale('pl', pl);
</script>
<script>
(function () {

  /* ─────────────────────────────────────────────────────────────
     LIVE PREVIEW — pełny widok projektu, jak na stronie
  ───────────────────────────────────────────────────────────── */
  var c = {
    bg:      '#f6f2ed',
    bg2:     '#ede9e3',
    bg3:     'rgba(0,0,0,.045)',
    text:    '#1a1818',
    muted:   '#5a5550',
    border:  'rgba(0,0,0,.09)',
    accent:  '#5872a4',
    accent2: '#405a8c',
    ui:      'Syne, sans-serif',
    head:    'Manrope, sans-serif',
    body:    'Inter, sans-serif'
  };

  function sectionLabel(text) {
    return h('p', { style: { fontSize: '0.62rem', letterSpacing: '0.2em', textTransform: 'uppercase',
      color: c.muted, fontFamily: c.ui, margin: '2.5rem 0 0.75rem' } }, text);
  }

  var ProjectPreview = createClass({
    render: function () {
      var e   = this.props.entry;
      var get = this.props.getAsset;

      /* Ścieżki /folder/zdjecie.jpg działają wprost na tej samej domenie;
         tylko nowe pliki z /uploads potrzebują getAsset */
      function resolve(p) {
        if (!p) return null;
        var s = String(p);
        if (s.charAt(0) === '/' && s.indexOf('/uploads/') !== 0) return s;
        var a = get(s);
        return a ? a.toString() : s;
      }

      var title    = e.getIn(['data','title_pl'])    || 'Tytuł projektu';
      var cat      = e.getIn(['data','category_pl']) || 'Kategoria';
      var subtitle = e.getIn(['data','subtitle_pl']) || '';
      var desc     = e.getIn(['data','card_desc_pl'])|| '';
      var featured = e.getIn(['data','featured']);
      var badge    = e.getIn(['data','badge_pl']);
      var thumbSrc = resolve(e.getIn(['data','thumb']));
      var tagsRaw  = e.getIn(['data','tags']);
      var story    = e.getIn(['data','story']);
      var video    = e.getIn(['data','video']);

      var tagList = [];
      if (typeof tagsRaw === 'string' && tagsRaw.trim()) {
        tagList = tagsRaw.split(',').map(function(t){ return t.trim(); }).filter(Boolean);
      }

      /* ── karta projektu (strona główna) ── */
      var card = h('div', { style: { maxWidth: '860px', border: '1px solid ' + c.border, background: '#fff',
          display: 'grid', gridTemplateColumns: '58% 42%' } },
        h('div', { style: { position: 'relative', overflow: 'hidden', aspectRatio: '4/3', background: c.bg2 } },
          (featured && badge) ? h('div', { style: { position: 'absolute', top: '1rem', left: '1rem',
            background: c.accent, color: '#fff', fontFamily: c.ui, fontSize: '0.56rem', fontWeight: 600,
            letterSpacing: '0.14em', textTransform: 'uppercase', padding: '0.28rem 0.7rem',
            borderRadius: '100px', zIndex: 2 } }, badge) : null,
          thumbSrc
            ? h('img', { src: thumbSrc, style: { width: '100%', height: '100%', objectFit: 'cover', display: 'block' } })
            : h('div', { style: { width: '100%', height: '100%', display: 'flex', alignItems: 'center',
                justifyContent: 'center', color: c.muted, fontSize: '0.8rem', flexDirection: 'column', gap: '0.5rem' } },
                h('span', { style: { fontSize: '1.5rem' } }, '🖼'),
                h('span', null, 'Dodaj zdjęcie główne'))
        ),
        h('div', { style: { padding: '2rem 1.75rem', display: 'flex', flexDirection: 'column', gap: '0.5rem',
            borderLeft: '1px solid ' + c.border } },
          h('div', { style: { color: c.accent, fontSize: '0.6rem', letterSpacing: '0.18em',
            textTransform: 'uppercase', fontFamily: c.ui, fontWeight: 600 } }, cat),
          h('h2',  { style: { fontFamily: c.head, fontSize: '1.7rem', fontWeight: 300, color: c.text,
            margin: 0, lineHeight: 1.1 } }, title),
          h('div', { style: { fontSize: '0.7rem', color: c.muted, lineHeight: 1.5 } }, subtitle),
          h('p',   { style: { fontSize: '0.8rem', color: c.text, opacity: 0.75, lineHeight: 1.6, margin: 0 } }, desc),
          tagList.length
            ? h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '0.3rem', marginTop: '0.1rem' } },
                tagList.map(function (t, i) {
                  return h('span', { key: i, style: { fontFamily: c.ui, fontSize: '0.54rem', letterSpacing: '0.08em',
                    textTransform: 'uppercase', padding: '0.2rem 0.6rem', border: '1px solid ' + c.border,
                    borderRadius: '100px', color: c.muted } }, t);
                }))
            : null,
          h('div', { style: { fontSize: '0.64rem', fontFamily: c.ui, fontWeight: 500, color: c.accent,
            marginTop: '0.25rem' } }, 'Otwórz projekt →')
        )
      );

      /* ── sekcje treści (widok szczegółowy) ── */
      var blocks = [];
      if (story && story.size) {
        story.forEach(function (block, bi) {
          var text = block.get('pl');
          var img  = resolve(block.get('img'));
          var imgs = block.get('imgs');

          if (text && img) {
            var flip = bi % 2 === 1;
            blocks.push(h('div', { key: 'b'+bi, style: { display: 'grid', gridTemplateColumns: '1fr 1fr',
                gap: '1.5rem', alignItems: 'center', padding: '1.5rem 0', borderBottom: '1px solid ' + c.border } },
              h('p',  { style: { fontSize: '0.82rem', fontWeight: 300, color: c.text, lineHeight: 1.8,
                margin: 0, order: flip ? 2 : 1 } }, text),
              h('img', { src: img, style: { width: '100%', aspectRatio: '4/3', objectFit: 'cover',
                borderRadius: '6px', order: flip ? 1 : 2 } })
            ));
          } else if (text) {
            blocks.push(h('p', { key: 'b'+bi, style: { fontSize: '0.82rem', fontWeight: 300, color: c.text,
              lineHeight: 1.8, padding: '1.25rem 0', borderBottom: '1px solid ' + c.border, margin: 0 } }, text));
          }

          var gallery = [];
          if (img && !text) gallery.push(img);
          if (imgs && imgs.size) imgs.forEach(function (i) { var s = resolve(i); if (s) gallery.push(s); });
          if (gallery.length) {
            blocks.push(h('div', { key: 'g'+bi, style: { display: 'grid',
                gridTemplateColumns: 'repeat(auto-fill, minmax(120px, 1fr))', gap: '2px', margin: '1.25rem 0' } },
              gallery.map(function (s, i) {
                return h('img', { key: i, src: s, style: { width: '100%', aspectRatio: '4/3', objectFit: 'cover' } });
              })));
          }
        });
      }

      return h('div', { style: { background: c.bg, minHeight: '100vh', padding: '2rem',
          fontFamily: c.body, color: c.text } },

        sectionLabel('↓ Tak wygląda karta projektu na stronie głównej'),
        card,

        blocks.length ? sectionLabel('↓ Tak wygląda treść projektu po otwarciu') : null,
        blocks.length
          ? h('div', { style: { maxWidth: '860px', background: '#fff', border: '1px solid ' + c.border,
              padding: '1.5rem 2rem' } }, blocks)
          : null,

        video ? h('p', { style: { maxWidth: '860px', marginTop: '1rem', fontSize: '0.75rem', color: c.muted } },
            '🎬 Ten projekt ma podpięte wideo — pokaże się na końcu widoku projektu.') : null,

        h('div', { style: { maxWidth: '860px', margin: '2rem 0 0', padding: '0.9rem 1.1rem',
            background: 'rgba(88,114,164,.07)', border: '1px solid rgba(88,114,164,.18)',
            borderRadius: '6px', fontSize: '0.74rem', color: c.muted, lineHeight: 1.6 } },
          h('strong', { style: { color: c.accent, fontWeight: 500 } }, 'Wskazówka: '),
          'podgląd odświeża się na żywo podczas pisania. Po kliknięciu „Opublikuj" strona zaktualizuje się w ciągu ok. 1 minuty.')
      );
    }
  });

  CMS.registerPreviewTemplate('projects', ProjectPreview);
  CMS.registerPreviewStyle('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Syne:wght@500;600&family=Inter:wght@300;400;500&display=swap');

  /* ─────────────────────────────────────────────────────────────
     KOLEJNOŚĆ PROJEKTÓW — widżet z kartami i przeciąganiem
  ───────────────────────────────────────────────────────────── */
  var OrderControl = createClass({
    getInitialState: function () {
      return { tick: 0, dragIdx: null, overIdx: null };
    },
    componentDidMount: function () { this._meta = {}; this.loadMeta(); },
    componentDidUpdate: function () { this.loadMeta(); },
    ids: function () {
      var v = this.props.value;
      return v && v.toJS ? v.toJS() : (v || []);
    },
    loadMeta: function () {
      var self = this;
      if (!this._meta) this._meta = {};
      this.ids().forEach(function (id) {
        if (self._meta[id] !== undefined) return;
        self._meta[id] = null;
        fetch('/data/projects/' + encodeURIComponent(id) + '.json')
          .then(function (r) { return r.ok ? r.json() : { missing: true }; })
          .catch(function () { return { missing: true }; })
          .then(function (p) {
            self._meta[id] = p;
            self.setState({ tick: self.state.tick + 1 });
          });
      });
    },
    move: function (from, to) {
      var v = this.props.value;
      if (!v || from === to || to < 0 || to >= v.size) return;
      var item = v.get(from);
      this.props.onChange(v.delete(from).insert(to, item));
    },
    removeAt: function (i) {
      var id = this.props.value.get(i);
      if (window.confirm('Usunąć „' + id + '" z kolejności? Projekt zniknie ze strony (plik projektu zostaje).')) {
        this.props.onChange(this.props.value.delete(i));
      }
    },
    render: function () {
      var self = this;
      var ids = this.ids();

      var cards = ids.map(function (id, i) {
        var p = (self._meta || {})[id];
        var missing = p && p.missing;
        var thumb = p && p.thumb ? p.thumb : null;
        var isOver = self.state.overIdx === i && self.state.dragIdx !== null && self.state.dragIdx !== i;

        function iconBtn(label, txt, onClick, danger) {
          return h('button', { type: 'button', title: label, onClick: onClick,
            style: { border: 'none', background: 'none', cursor: 'pointer', fontSize: '1rem',
              padding: '0.3rem 0.45rem', borderRadius: '4px', color: danger ? '#b3403a' : '#5a5550',
              lineHeight: 1 } }, txt);
        }

        return h('div', {
            key: id + i,
            draggable: true,
            onDragStart: function (e) { e.dataTransfer.setData('text/plain', String(i)); self.setState({ dragIdx: i }); },
            onDragOver:  function (e) { e.preventDefault(); if (self.state.overIdx !== i) self.setState({ overIdx: i }); },
            onDrop:      function (e) { e.preventDefault(); self.move(self.state.dragIdx, i); self.setState({ dragIdx: null, overIdx: null }); },
            onDragEnd:   function ()  { self.setState({ dragIdx: null, overIdx: null }); },
            style: {
              display: 'flex', alignItems: 'center', gap: '0.75rem',
              padding: '0.5rem 0.75rem', marginBottom: '6px',
              background: '#fff', border: '1px solid ' + (isOver ? '#5872a4' : 'rgba(0,0,0,.12)'),
              borderRadius: '8px', cursor: 'grab', userSelect: 'none',
              boxShadow: isOver ? '0 0 0 2px rgba(88,114,164,.25)' : 'none',
              opacity: self.state.dragIdx === i ? 0.45 : 1
            }
          },
          h('span', { title: 'Przeciągnij, aby zmienić kolejność',
            style: { fontSize: '1.05rem', color: '#9a948c', cursor: 'grab', padding: '0 0.15rem' } }, '⠿'),
          h('span', { style: { fontFamily: 'Syne, sans-serif', fontSize: '0.7rem', fontWeight: 600,
            color: '#5872a4', width: '1.4rem', textAlign: 'center' } }, String(i + 1)),
          thumb
            ? h('img', { src: thumb, style: { width: '64px', height: '48px', objectFit: 'cover',
                borderRadius: '4px', flexShrink: 0, pointerEvents: 'none' } })
            : h('div', { style: { width: '64px', height: '48px', borderRadius: '4px', background: '#ede9e3',
                display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.7rem',
                color: '#9a948c', flexShrink: 0 } }, missing ? '⚠️' : '…'),
          h('div', { style: { flex: 1, minWidth: 0 } },
            h('div', { style: { fontSize: '0.85rem', fontWeight: 500, color: missing ? '#b3403a' : '#1a1818',
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } },
              missing ? 'Nie znaleziono projektu!' : ((p && p.title_pl) || id)),
            h('div', { style: { fontSize: '0.68rem', color: '#9a948c' } }, id)
          ),
          iconBtn('Przenieś wyżej',  '↑', function () { self.move(i, i - 1); }),
          iconBtn('Przenieś niżej',  '↓', function () { self.move(i, i + 1); }),
          iconBtn('Usuń z kolejności', '✕', function () { self.removeAt(i); }, true)
        );
      });

      return h('div', { id: this.props.forID, className: this.props.classNameWrapper,
          style: { background: '#faf8f5', padding: '0.75rem', borderRadius: '8px' } },
        h('p', { style: { fontSize: '0.74rem', color: '#5a5550', margin: '0 0 0.75rem' } },
          'Przeciągnij karty (lub użyj strzałek), aby ustawić kolejność projektów na stronie głównej.'),
        cards
      );
    }
  });

  var OrderPreview = createClass({
    render: function () {
      var v = this.props.value;
      var ids = v && v.toJS ? v.toJS() : (v || []);
      return h('ol', { style: { fontFamily: 'Inter, sans-serif', fontSize: '0.85rem', padding: '1.5rem 2.5rem' } },
        ids.map(function (id, i) { return h('li', { key: i }, id); }));
    }
  });

  CMS.registerWidget('projectOrder', OrderControl, OrderPreview);

  /* ─────────────────────────────────────────────────────────────
     STYL PANELU — kolory marki zamiast domyślnego niebieskiego
  ───────────────────────────────────────────────────────────── */
  function injectShellStyles () {
    if (document.getElementById('kt-cms-styles')) return;
    var s = document.createElement('style');
    s.id = 'kt-cms-styles';
    s.textContent = [
      /* przyciski główne */
      'button[class*="primary"],a[class*="primary"]{background:#5872a4!important;border-color:#5872a4!important;color:#fff!important;}',
      'button[class*="primary"]:hover,a[class*="primary"]:hover{background:#405a8c!important;}',
      /* aktywna nawigacja */
      '[class*="NavLink"][class*="active"],[class*="nav"][class*="active"]{color:#5872a4!important;border-color:#5872a4!important;}',
      /* tło listy wpisów w cieplejszym tonie */
      '[class*="AppMainContainer"]{background:#faf8f5;}',
      /* karty wpisów — delikatny hover */
      '[class*="ListCard"]:hover,[class*="card"]:hover{box-shadow:0 2px 12px rgba(88,114,164,.18)!important;}',
      /* zaznaczenia / focus pól */
      'input:focus,textarea:focus{border-color:#5872a4!important;box-shadow:0 0 0 2px rgba(88,114,164,.2)!important;}',
      /* kontrolki pozycji listy (sekcje, zdjęcia galerii) — widoczne, nie ukryte ikonki */
      '[class*="ListItemTopBar"]{background:#f0ece6!important;border-radius:6px 6px 0 0;}',
      '[class*="ListItemTopBar"] button svg,[class*="ListItemTopBar"] [aria-roledescription="sortable"] svg{width:18px!important;height:18px!important;}',
      '[class*="ListItemTopBar"] button:last-of-type{color:#b3403a!important;}',
      '[class*="ListItemTopBar"] button:last-of-type:hover{background:rgba(179,64,58,.12)!important;border-radius:4px;}',
      '[class*="ListItemTopBar"] [aria-roledescription="sortable"]{cursor:grab!important;color:#5872a4!important;padding:0 4px;}',
      '[class*="ListItemTopBar"] [aria-roledescription="sortable"]:hover{background:rgba(88,114,164,.12);border-radius:4px;}'
    ].join('\n');
    document.head.appendChild(s);
  }

  /* polskie podpowiedzi na ikonkach listy (rozwiń / przeciągnij / usuń) */
  function labelListControls () {
    document.querySelectorAll('[class*="ListItemTopBar"]').forEach(function (bar) {
      if (bar.dataset.ktLabeled) return;
      bar.dataset.ktLabeled = '1';
      var btns = bar.querySelectorAll('button');
      if (btns[0]) btns[0].title = 'Rozwiń / zwiń';
      var drag = bar.querySelector('[aria-roledescription="sortable"]');
      if (drag) drag.title = 'Przeciągnij, aby zmienić kolejność';
      if (btns.length > 1) btns[btns.length - 1].title = 'Usuń';
    });
  }

  /* obserwator zamiast sztywnych timeoutów — styl trafia także po
     przełączeniu widoków, gdy Decap przerysuje interfejs */
  injectShellStyles();
  labelListControls();
  new MutationObserver(function () { injectShellStyles(); labelListControls(); })
    .observe(document.body, { childList: true, subtree: true });

})();
</script>
</body>
</html>
