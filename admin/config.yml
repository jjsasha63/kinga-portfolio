backend:
  name: git-gateway
  branch: master

media_folder: "uploads"
public_folder: "uploads"

collections:

  # ── PROJECTS (one file per project) ──────────────────────────
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "data/projects"
    create: true
    slug: "{{id}}"
    extension: "json"
    format: "json"
    identifier_field: "title_pl"
    summary: "{{title_pl}}"
    fields:

      - label: "ID (unique, no spaces)"
        name: id
        widget: string
        hint: "e.g. my-new-project — used as filename, don't change after creation"

      - label: "Featured?"
        name: featured
        widget: boolean
        default: false

      - label: "Badge (PL)"
        name: badge_pl
        widget: string
        required: false
        hint: "e.g. Wyróżniony projekt — leave blank for none"

      - label: "Badge (EN)"
        name: badge_en
        widget: string
        required: false

      - label: "Category (PL)"
        name: category_pl
        widget: string

      - label: "Category (EN)"
        name: category_en
        widget: string

      - label: "Title (PL)"
        name: title_pl
        widget: string

      - label: "Title (EN)"
        name: title_en
        widget: string

      - label: "Subtitle (PL)"
        name: subtitle_pl
        widget: string

      - label: "Subtitle (EN)"
        name: subtitle_en
        widget: string

      - label: "Card description (PL)"
        name: card_desc_pl
        widget: text

      - label: "Card description (EN)"
        name: card_desc_en
        widget: text

      - label: "Tags"
        name: tags
        widget: list
        field:
          label: Tag
          name: tag
          widget: string

      - label: "Thumbnail image"
        name: thumb
        widget: image

      - label: "Video (optional)"
        name: video
        widget: file
        required: false

      - label: "Story blocks"
        name: story
        widget: list
        hint: "Each block = text paragraph + optional image. Last block can be gallery-only."
        fields:
          - label: "Text (PL)"
            name: pl
            widget: text
            required: false
          - label: "Text (EN)"
            name: en
            widget: text
            required: false
          - label: "Image (alongside text)"
            name: img
            widget: image
            required: false
          - label: "Gallery images"
            name: imgs
            widget: list
            required: false
            field:
              label: Image
              name: image
              widget: image

  # ── PROJECT ORDER ─────────────────────────────────────────────
  - name: "settings"
    label: "Settings"
    files:
      - label: "Project display order"
        name: "order"
        file: "data/order.json"
        fields:
          - label: "Project IDs in display order"
            name: order
            widget: list
            hint: "Drag to reorder. Each value must match a project's ID exactly."
            field:
              label: Project ID
              name: id
              widget: string
