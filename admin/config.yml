backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "uploads"

collections:
  - name: "projects"
    label: "Projects"
    files:
      - label: "All Projects"
        name: "all_projects"
        file: "data/projects.json"
        fields:
          - label: "Projects"
            name: projects
            widget: list
            summary: "{{fields.title_pl}}"
            fields:
              - label: "ID (no spaces, e.g. my-project)"
                name: id
                widget: string

              - label: "Featured project?"
                name: featured
                widget: boolean
                default: false

              - label: "Badge label (PL)"
                name: badge_pl
                widget: string
                required: false
                hint: "e.g. Wyróżniony projekt — leave blank if none"

              - label: "Badge label (EN)"
                name: badge_en
                widget: string
                required: false

              - label: "Category (PL)"
                name: category_pl
                widget: string
                hint: "e.g. Projektowanie wnętrz"

              - label: "Category (EN)"
                name: category_en
                widget: string
                hint: "e.g. Interior Design"

              - label: "Title (PL)"
                name: title_pl
                widget: string

              - label: "Title (EN)"
                name: title_en
                widget: string

              - label: "Subtitle / location (PL)"
                name: subtitle_pl
                widget: string
                hint: "e.g. Kraków — Projekt wnętrz, 2024"

              - label: "Subtitle / location (EN)"
                name: subtitle_en
                widget: string

              - label: "Short description (PL)"
                name: card_desc_pl
                widget: text
                hint: "1–2 sentences shown on the project card"

              - label: "Short description (EN)"
                name: card_desc_en
                widget: text

              - label: "Tags"
                name: tags
                widget: list
                hint: "Short labels, e.g. Residential, Kraków, 2024"
                field:
                  label: Tag
                  name: tag
                  widget: string

              - label: "Thumbnail image"
                name: thumb
                widget: image
                hint: "Main image shown in the project list"

              - label: "Video (optional)"
                name: video
                widget: file
                required: false
                hint: "Upload an .mp4 walkthrough video"

              - label: "Story blocks"
                name: story
                widget: list
                hint: "Each block is a text paragraph paired with an optional image. Add a final block with only gallery images for the thumbnail strip."
                fields:
                  - label: "Text (PL)"
                    name: pl
                    widget: text
                    required: false

                  - label: "Text (EN)"
                    name: en
                    widget: text
                    required: false

                  - label: "Single image (alongside text)"
                    name: img
                    widget: image
                    required: false
                    hint: "Leave empty for a gallery-only block"

                  - label: "Gallery images (multiple)"
                    name: imgs
                    widget: list
                    required: false
                    hint: "Add multiple images here for the scrollable strip"
                    field:
                      label: Image
                      name: image
                      widget: image
