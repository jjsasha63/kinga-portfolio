backend:
  name: git-gateway
  branch: master

# Działa tylko lokalnie (localhost + `npx decap-server`); w produkcji ignorowane.
local_backend: true

# Polski interfejs panelu (locale rejestrowane w admin/index.html)
locale: "pl"

media_folder: "uploads"
public_folder: "/uploads"

site_url: "https://kinga-trojan.netlify.app"
display_url: "https://kinga-trojan.netlify.app"
logo_url: "https://kinga-trojan.netlify.app/apple-touch-icon.png"

collections:

  # ── PROJEKTY ──────────────────────────────────────────────────
  - name: "projects"
    label: "Projekty"
    label_singular: "Projekt"
    description: "Karty projektów na stronie głównej. Kolejność wyświetlania zmienisz w zakładce Ustawienia."
    folder: "data/projects"
    create: true
    slug: "{{fields.id}}"
    extension: "json"
    format: "json"
    identifier_field: "title_pl"
    summary: "{{title_pl}} — {{category_pl}}"
    sortable_fields: ["title_pl", "category_pl"]
    view_filters:
      - label: "Wyróżnione"
        field: featured
        pattern: true

    fields:

      # ── 1. ZDJĘCIE GŁÓWNE ────────────────────────────────────
      - label: "Zdjęcie główne"
        name: thumb
        widget: image
        required: false
        hint: "Pokazuje się na karcie projektu na stronie głównej. Najlepiej render lub zdjęcie wnętrza — nie rzut ani plansza z tekstem."

      - label: "Projekt wyróżniony?"
        name: featured
        widget: boolean
        default: false
        hint: "Wyróżnione projekty mają kolorową wstążkę na karcie (tekst wstążki ustawisz poniżej)."

      - label: "Tekst wstążki (PL)"
        name: badge_pl
        widget: string
        required: false
        hint: "Widoczny tylko, gdy projekt jest wyróżniony. Np. „Wyróżniony projekt” albo „Praca magisterska”."

      - label: "Tekst wstążki (EN)"
        name: badge_en
        widget: string
        required: false

      # ── 2. NAZWA I KATEGORIA ─────────────────────────────────
      - label: "Tytuł (PL)"
        name: title_pl
        widget: string
        hint: "Główna nazwa projektu — na karcie i w widoku szczegółowym."

      - label: "Tytuł (EN)"
        name: title_en
        widget: string

      - label: "Kategoria (PL)"
        name: category_pl
        widget: string
        hint: "Np. Projektowanie wnętrz / Architektura mieszkaniowa."

      - label: "Kategoria (EN)"
        name: category_en
        widget: string
        hint: "Np. Interior Design / Residential Architecture."

      - label: "Podtytuł / lokalizacja (PL)"
        name: subtitle_pl
        widget: string
        hint: "Mniejszy tekst pod tytułem. Np. „Kraków — Projekt wnętrz, 2024”."

      - label: "Podtytuł / lokalizacja (EN)"
        name: subtitle_en
        widget: string

      # ── 3. OPIS NA KARCIE I TAGI ─────────────────────────────
      - label: "Krótki opis (PL)"
        name: card_desc_pl
        widget: text
        hint: "1–2 zdania widoczne na karcie na stronie głównej."

      - label: "Krótki opis (EN)"
        name: card_desc_en
        widget: text

      - label: "Tagi (PL)"
        name: tags_pl
        widget: string
        hint: "Etykiety po polsku, oddzielone przecinkami — hasła o projekcie (nie o programach!), np. Kraków, Dom jednorodzinny, Wnętrza. Najlepiej 4–6 tagów."

      - label: "Tagi (EN)"
        name: tags_en
        widget: string
        required: false
        hint: "Te same etykiety po angielsku, oddzielone przecinkami — np. Kraków, Single-family house, Interiors."

      # ── 4. TREŚĆ PROJEKTU ────────────────────────────────────
      - label: "Treść projektu"
        name: story
        widget: list
        label_singular: "sekcję"
        collapsed: true
        minimize_collapsed: true
        summary: "{{fields.pl}}"
        hint: >
          Każda sekcja to jeden fragment widoku projektu.
          Typowy projekt: 3 sekcje tekst+zdjęcie, a na końcu jedna sekcja-galeria.
          • Sekcja z tekstem: wpisz tekst PL i EN oraz dodaj jedno zdjęcie obok tekstu.
          • Sekcja-galeria: zostaw teksty puste i dodaj kilka zdjęć w polu „Galeria zdjęć” —
          pokażą się jako siatka zdjęć.
        fields:
          - label: "Tekst (PL)"
            name: pl
            widget: text
            required: false
            hint: "Zostaw puste, jeśli to sekcja-galeria."

          - label: "Tekst (EN)"
            name: en
            widget: text
            required: false

          - label: "Zdjęcie obok tekstu"
            name: img
            widget: image
            required: false
            hint: "Jedno zdjęcie wyświetlane obok akapitu. Zostaw puste w sekcji-galerii."

          - label: "Galeria zdjęć"
            name: imgs
            widget: list
            required: false
            hint: "Kilka zdjęć pokazywanych jako siatka. Używaj w sekcji-galerii, w sekcjach z tekstem zostaw puste."
            field:
              label: "Zdjęcie"
              name: image
              widget: image

      # ── 5. WIDEO (OPCJONALNE) ────────────────────────────────
      - label: "Wideo — spacer po projekcie (opcjonalne)"
        name: video
        widget: file
        required: false
        hint: "Plik .mp4 — pokaże się na końcu widoku projektu."

      # ── 6. ZAAWANSOWANE ──────────────────────────────────────
      - label: "ID projektu (nie zmieniaj!)"
        name: id
        widget: string
        hint: "⚠️ Ustaw raz przy tworzeniu projektu i nigdy nie zmieniaj — to nazwa pliku. Tylko małe litery, cyfry i myślniki, np. dom-krakow-2024. Po zmianie projekt zniknie ze strony!"

  # ── KOLEJNOŚĆ PROJEKTÓW ───────────────────────────────────────
  - name: "settings"
    label: "Ustawienia"
    files:
      - label: "Kolejność projektów na stronie"
        name: "order"
        file: "data/order.json"
        fields:
          - label: "Kolejność"
            name: order
            widget: projectOrder
            hint: "Projekty pokazują się na stronie głównej w tej kolejności."
